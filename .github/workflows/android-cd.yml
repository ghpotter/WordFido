name: Android CD Release Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Gradle Cache
      uses: gradle/actions/setup-gradle@v3

    # This step decodes your keystore from GitHub Secrets and reconstructs the file on the runner
    - name: Decode Keystore
      run: |
        echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release-keystore.jks

    # Build the signed release bundle using absolute paths to avoid daemon directory traps
    - name: Build Signed Release APK
      run: |
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release-keystore.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

    # Uploads the final APK so you can download it directly from the GitHub Actions dashboard
    - name: Upload Release Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Signed-Release-APK
        path: app/build/outputs/apk/release/app-release.apk